[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "papercoach"
version = "0.1.0"
description = "Grounded PDF annotation pipeline for research papers"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.7",
  "pymupdf>=1.24",
  "requests>=2.31",
  "graphviz>=0.20",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
]

[project.scripts]
papercoach = "papercoach.cli:main"

[tool.setuptools]
packages = ["papercoach", "papercoach.analyze", "papercoach.render", "papercoach.integrations", "papercoach.reporting"]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]
pythonpath = ["."]
